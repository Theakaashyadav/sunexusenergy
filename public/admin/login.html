<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/admin.css">

    <script src="/assets/js/catalog-data.js"></script>
    <script src="/assets/js/admin.js"></script>

    <title>Admin Access | Sunexus</title>
</head>

<body>
    <div id="header"></div>

<div class="login-wrap">

    <div class="login-card">

        <h1 id="formTitle">Admin Login</h1>
        <p>Sunexus Product Management</p>

        <br>

        <!-- LOGIN FORM -->
        <form id="loginForm"
      onsubmit="adminLogin(event)">

    <div class="admin-form">

        <input type="tel"
               placeholder="Phone Number"
               maxlength="10"
               required>

        <input type="password"
               placeholder="Password"
               required>

        <button type="submit" class="btn">
            Login
        </button>

    </div>

</form>

        <!-- REGISTER FORM -->
        <form id="registerForm" style="display:none;"
      onsubmit="adminRegister(event)">

    <div class="admin-form">

        <input type="text"
               placeholder="Full Name"
               required>

        <input type="tel"
               placeholder="Phone Number"
               maxlength="10"
               required>

        <input type="password"
               placeholder="Create Password"
               required>

        <button type="submit" class="btn">
            Register
        </button>

    </div>

</form>

        <!-- <div style="margin-top:15px;text-align:center;">
            <a href="#" id="toggleForm" onclick="toggleAuthForm(); return false;">
                Create New Admin Account
            </a>
        </div> -->

        <div style="margin-top:15px;text-align:center;">
    <a href="/index.html" class="home-link">
        ← Return to Home
    </a>
</div>

    </div>

</div>
 <div id="footer"></div>
<script>
function toggleAuthForm() {

    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const formTitle = document.getElementById("formTitle");
    const toggleLink = document.getElementById("toggleForm");

    if (loginForm.style.display !== "none") {
        loginForm.style.display = "none";
        registerForm.style.display = "block";
        formTitle.innerText = "Admin Registration";
        toggleLink.innerText = "Already have an account? Login";
    } else {
        loginForm.style.display = "block";
        registerForm.style.display = "none";
        formTitle.innerText = "Admin Login";
        toggleLink.innerText = "Create New Admin Account";
    }
}
</script>

</body>
</html>
