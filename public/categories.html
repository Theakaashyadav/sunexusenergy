<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="/assets/css/style.css"><title>Categories | Sunexus</title></head><body><div id="header"></div><section class="page-hero" style="--bg:url('https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?auto=format&fit=crop&w=1700&q=80')"><h1>Product Categories</h1><p>Organized categories for solar and electrical project procurement.</p></section><section class="section"><div class="grid" id="catGrid"></div></section><script src="/assets/js/catalog-data.js"></script><script>document.addEventListener('DOMContentLoaded',()=>{setTimeout(()=>{const cats=[...new Set(CATALOG_PRODUCTS.map(p=>p.cat))];catGrid.innerHTML=cats.map(c=>`<a class="cat-card" href="/products.html"><h3>${c}</h3><p>${CATALOG_PRODUCTS.filter(p=>p.cat===c).length} products available</p></a>`).join('')},100)})</script><div id="footer"></div><script src="/assets/js/main.js"></script></body></html>
